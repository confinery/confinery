# cargo-deny policy. See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses acceptable for a redistributable binary.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# The dependency graph is clean of duplicate versions today (verified with
# `cargo tree -d`, including --all-features and the Windows target); deny
# rather than warn so a future dependency bump that introduces one is a
# build failure to fix, not a warning to eventually notice.
multiple-versions = "deny"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
