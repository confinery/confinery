# Balanced sandbox for an AI coding assistant working inside a project.
# Copy this file, adjust the paths, and run:  confinery run --profile assistant.toml -- <tool>

name = "assistant"
description = "Balanced sandbox for an AI coding assistant working in a project"

[filesystem]
read_only = [
    "/usr", "/bin", "/sbin", "/lib", "/lib64",
    "/etc/alternatives", "/etc/ssl", "/etc/ca-certificates", "/etc/resolv.conf",
]
read_write = ["./"]
tmpfs = ["/tmp"]
deny = [
    "~/.ssh", "~/.aws", "~/.gnupg", "~/.config/gh",
    "~/.kube", "~/.docker/config.json", "/etc/shadow",
]

[network]
# Assistants usually need to reach a model API. `loopback` is the safe
# default: it does not give the sandboxed process real internet access, so
# it will not actually reach api.anthropic.com/api.openai.com as shipped.
#
# Setting this to "full" opens unrestricted, unmonitored egress -- and this
# profile forwards ANTHROPIC_API_KEY/OPENAI_API_KEY below, so a compromised
# or prompt-injected process could exfiltrate them to any host. Host-based
# allowlisting (restricting egress to just the model API's hosts) is not
# yet enforced in-kernel (see docs/security-model.md), so there is
# currently no middle ground between this and `full`. `confinery profile
# validate` refuses to run this combination as an error, not a warning, for
# exactly that reason -- if you switch this to "full", remove the API key
# variables from [env] below, or accept that tradeoff deliberately.
mode = "loopback"

[resources]
memory = "4GiB"
cpu = 4
pids = 1024
open_files = 4096
timeout = "30m"

[syscalls]
# Allow everything except the curated dangerous set (mount, ptrace, bpf, ...).
default = "allow"
preset = "hardened"
block_action = "errno"

[capabilities]
keep = []

[env]
mode = "allowlist"
allow = [
    "PATH", "HOME", "USER", "LOGNAME", "LANG", "LC_ALL", "TERM", "TZ", "TMPDIR",
    "ANTHROPIC_API_KEY", "OPENAI_API_KEY",
]

[tools]
# Empty means any executable is allowed. List basenames to restrict.
allow = []
