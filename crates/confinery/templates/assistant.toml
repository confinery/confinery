# Balanced sandbox for an AI coding assistant working inside a project.
# Copy this file, adjust the paths, and run:  confinery run --profile assistant.toml -- <tool>

name = "assistant"
description = "Balanced sandbox for an AI coding assistant working in a project"

[filesystem]
read_only = [
    "/usr", "/bin", "/sbin", "/lib", "/lib64",
    "/etc/alternatives", "/etc/ssl", "/etc/ca-certificates", "/etc/resolv.conf",
]
read_write = ["./"]
tmpfs = ["/tmp"]
deny = [
    "~/.ssh", "~/.aws", "~/.gnupg", "~/.config/gh",
    "~/.kube", "~/.docker/config.json", "/etc/shadow",
]

[network]
# Assistants usually need to reach a model API. `allowlist` gives the
# sandboxed process real network access, but every connect(2) is checked
# against `allow` below by a seccomp filter in the parent process -- an
# attempt to reach anything else is refused, so a compromised or
# prompt-injected process can't use ANTHROPIC_API_KEY/OPENAI_API_KEY
# (forwarded in [env] below) to exfiltrate to an arbitrary host. See
# docs/security-model.md#known-limits for what this does and doesn't
# cover (e.g. it only intercepts connect(), not connectionless UDP/DNS).
mode = "allowlist"
allow = ["api.anthropic.com:443", "api.openai.com:443"]

[resources]
memory = "4GiB"
cpu = 4
pids = 1024
open_files = 4096
timeout = "30m"

[syscalls]
# Allow everything except the curated dangerous set (mount, ptrace, bpf, ...).
default = "allow"
preset = "hardened"
block_action = "errno"

[capabilities]
keep = []

[env]
mode = "allowlist"
allow = [
    "PATH", "HOME", "USER", "LOGNAME", "LANG", "LC_ALL", "TERM", "TZ", "TMPDIR",
    "ANTHROPIC_API_KEY", "OPENAI_API_KEY",
]

[tools]
# Empty means any executable is allowed. List basenames to restrict.
allow = []
